version: '3.8'

services:
  # 1. La base de données MongoDB
  database:
    image: mongo:latest
    container_name: mongodb
    volumes:
      - mongo-data:/data/db
    restart: always

  # 2. Ton API Node.js
  backend:
    build: ./backend  # Il va chercher le Dockerfile dans le dossier "backend"
    container_name: api-backend
    environment:
      - MONGO_URI=mongodb://database:27017/magasin-jeux
    depends_on:
      - database
    restart: always

  # 3. Ton site Angular
  frontend:
    build: ./frontend # Il va chercher le Dockerfile dans le dossier "frontend"
    container_name: web-frontend
    depends_on:
      - backend
    restart: always

  # 4. Le serveur Nginx qui fait l'aiguillage
  proxy:
    image: nginx:alpine
    container_name: reverse-proxy
    ports:
      - "80:80" # Ouvre le port 80 vers l'extérieur
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf # Relie ton fichier nginx.conf au conteneur
    depends_on:
      - frontend
      - backend
    restart: always

volumes:
  mongo-data: